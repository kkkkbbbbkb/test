<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Main</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    min-height:100%;
}

html{
    scroll-behavior:smooth;
    touch-action:manipulation;
}

body{
    background:#fff;
    color:#222;
    max-width:500px;
    margin:auto;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding-bottom:calc(86px + env(safe-area-inset-bottom));
    min-height:100vh;
}

button,a,input{
    touch-action:manipulation;
}

/* 12시 로고 */
.header{
    height:68px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:20;
}

.logo-video{
    width:190px;
    height:54px;
    cursor:pointer;
}

.logo-video video{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* 배너 */
.banner-wrap{
    background:#fff;
    padding:8px 10px 6px;
}

.banner{
    width:100%;
    height:165px;
    border:2px solid #c9c9c9;
    border-radius:8px;
    overflow:hidden;
    background:#f2f3f7;
    position:relative;
    transition:all .25s ease;
}

.banner video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.dots{
    position:absolute;
    left:0;
    right:0;
    bottom:8px;
    display:flex;
    justify-content:center;
    gap:7px;
    z-index:5;
}

.dot{
    width:9px;
    height:9px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.9);
    background:rgba(255,255,255,.55);
    box-shadow:0 1px 4px rgba(0,0,0,.25);
}

.dot.active{
    background:#888;
    border-color:#fff;
}

/* 공지사항 오른쪽 -> 왼쪽 */
.notice{
    height:36px;
    background:#fff;
    overflow:hidden;
    white-space:nowrap;
    display:flex;
    align-items:center;
    border-top:1px solid #f1f1f1;
    border-bottom:1px solid #eee;
    color:#777;
    font-size:13px;
    font-weight:800;
}

.notice-icon{
    width:36px;
    text-align:center;
    flex-shrink:0;
}

.notice-track{
    display:inline-block;
    padding-left:100%;
    animation:noticeMove 12s linear infinite;
}

@keyframes noticeMove{
    from{transform:translateX(0)}
    to{transform:translateX(-100%)}
}

/* 로그인 줄 */
.login-row{
    margin:9px 8px 10px;
    display:flex;
    gap:4px;
    background:#e9e9e9;
    padding:8px;
    border-radius:14px;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 8px 18px rgba(30,50,100,.12);
}

.login-row input{
    width:23.8%;
    height:34px;
    border:1px solid #cfcfcf;
    border-radius:9px;
    padding:0 7px;
    font-size:16px;
    outline:none;
    background:linear-gradient(180deg,#f7f7f7,#d7d7d7);
    box-shadow:
        inset 0 2px 3px rgba(255,255,255,.9),
        inset 0 -2px 4px rgba(0,0,0,.08),
        0 3px 5px rgba(0,0,0,.08);
}

.login-row button{
    width:17.45%;
    height:34px;
    border-radius:9px;
    font-weight:900;
    font-size:10.5px;
    white-space:nowrap;
}

.login-row button.login-btn{
    border:1px solid #999;
    background:linear-gradient(180deg,#f5f5f5,#bfbfbf 55%,#9f9f9f);
    color:#222;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.7),
        inset 0 -2px 0 rgba(0,0,0,.12),
        0 4px 7px rgba(0,0,0,.15);
}

.login-row button.white-btn{
    border:1px solid #cfcfcf;
    background:linear-gradient(180deg,#fff,#f4f4f4 55%,#e1e1e1);
    color:#333;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.9),
        inset 0 -2px 0 rgba(0,0,0,.06),
        0 4px 7px rgba(0,0,0,.11);
}

/* 카지노/슬롯 영역 */
.game-section{
    display:flex;
    gap:6px;
    padding:6px 8px;
}

.side-tabs{
    width:54px;
    flex-shrink:0;
}

.side-tabs button{
    width:54px;
    height:54px;
    border-radius:13px;
    border:1px solid #c9c9c9;
    background:#fff;
    margin-bottom:8px;
    overflow:hidden;
    box-shadow:0 3px 8px rgba(30,50,100,.08);
    padding:0;
}

.side-tabs button.active{
    border:2px solid #999;
    box-shadow:0 0 0 2px rgba(120,120,120,.12),0 4px 10px rgba(0,0,0,.12);
}

.side-tabs img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.game-list{
    flex:1;
}

.game-card{
    height:124px;
    display:block;
    text-decoration:none;
    border:1.5px solid #c9c9c9;
    border-radius:9px;
    overflow:hidden;
    background:#f4f5f9;
    margin-bottom:8px;
    position:relative;
}

.game-card video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* 6시 하단 헤더 */
.bottom-nav{
    position:fixed;
    left:50%;
    bottom:0;
    bottom:env(safe-area-inset-bottom);
    transform:translateX(-50%);
    width:100%;
    max-width:500px;
    height:72px;
    background:#fff;
    border-radius:26px 26px 0 0;
    box-shadow:0 -6px 22px rgba(50,70,120,.15);
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:9999;
}

.bottom-nav a{
    width:20%;
    height:72px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    text-decoration:none;
    color:#777;
    font-size:11px;
    font-weight:900;
}

.bottom-nav img{
    width:40px;
    height:40px;
    object-fit:contain;
    display:block;
}

.bottom-nav a.home img{
    width:52px;
    height:52px;
    margin-top:-22px;
    border-radius:50%;
    box-shadow:0 0 18px rgba(0,0,0,.18);
}

@media(max-width:390px){
    .logo-video{width:170px;height:50px}
    .banner{height:150px}
    .login-row{gap:3px;padding:7px}
    .login-row input{width:23.4%;font-size:16px}
    .login-row button{width:17.73%;font-size:9.7px}
    .side-tabs{width:50px}
    .side-tabs button{width:50px;height:50px}
    .game-card{height:116px}
    .bottom-nav img{width:38px;height:38px}
    .bottom-nav a.home img{width:50px;height:50px}
}
</style>
</head>

<body>

<header class="header">
    <div class="logo-video" onclick="location.reload()">
        <video src="../../image/12logo.mp4" autoplay muted loop playsinline preload="auto"></video>
    </div>
</header>

<section class="banner-wrap">
    <div class="banner" id="bannerBox"></div>
</section>

<section class="notice">
    <div class="notice-icon">🔊</div>
    <div class="notice-track">공지사항 내용이 오른쪽에서 왼쪽으로 이동합니다. 이벤트 안내 / 점검 안내 / 가입 안내</div>
</section>

<section class="login-row">
    <input placeholder="아이디">
    <input type="password" placeholder="비밀번호">
    <button class="login-btn">로그인</button>
    <button class="white-btn" onclick="location.href='../signup/index.html'">회원가입</button>
    <button class="white-btn">무기명가입</button>
</section>

<section class="game-section">
    <nav class="side-tabs">
        <button id="casinoTab" class="active" onclick="showTab('casino')">
            <img src="../../image/casino.png" alt="카지노">
        </button>
        <button id="slotTab" onclick="showTab('slot')">
            <img src="../../image/slot.png" alt="슬롯">
        </button>
    </nav>

    <main class="game-list">
        <div id="casinoList">
            <a class="game-card" href="../casino/evolution/index.html"><video src="../../image/evolution.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../casino/pragmatic/index.html"><video src="../../image/pragmatic-casino.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../casino/ag/index.html"><video src="../../image/ag.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../casino/wm/index.html"><video src="../../image/wm.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../casino/dreamgame/index.html"><video src="../../image/dreamgame.mp4" autoplay muted loop playsinline preload="auto"></video></a>
        </div>

        <div id="slotList" style="display:none">
            <a class="game-card" href="../slot/pragmatic/index.html"><video src="../../image/pragmatic-slot.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../slot/boongo/index.html"><video src="../../image/boongo.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../slot/microgaming/index.html"><video src="../../image/microgaming.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../slot/pgsoft/index.html"><video src="../../image/pgsoft.mp4" autoplay muted loop playsinline preload="auto"></video></a>
            <a class="game-card" href="../slot/skywind/index.html"><video src="../../image/skywind.mp4" autoplay muted loop playsinline preload="auto"></video></a>
        </div>
    </main>
</section>

<nav class="bottom-nav">
    <a href="../money1/index.html"><img src="../../image/money1.png" alt="충전"></a>
    <a href="../money2/index.html"><img src="../../image/money2.png" alt="환전"></a>
    <a href="../home/index.html" class="home"><img src="../../image/home.png" alt="홈"></a>
    <a href="../cs/index.html"><img src="../../image/cs.png" alt="고객센터"></a>
    <a href="../mypage/index.html"><img src="../../image/mypage.png" alt="마이페이지"></a>
</nav>

<script>
const bannerVideos = [
    "../../image/banner1.mp4",
    "../../image/banner2.mp4",
    "../../image/banner3.mp4",
    "../../image/banner4.mp4",
    "../../image/banner5.mp4"
];

let bannerIndex = 0;
const bannerBox = document.getElementById("bannerBox");

function renderBanner(){
    bannerBox.innerHTML = `
        <video src="${bannerVideos[bannerIndex]}" autoplay muted loop playsinline preload="auto"></video>
        <div class="dots">
            <button class="dot ${bannerIndex === 0 ? "active" : ""}" onclick="goBanner(0)"></button>
            <button class="dot ${bannerIndex === 1 ? "active" : ""}" onclick="goBanner(1)"></button>
            <button class="dot ${bannerIndex === 2 ? "active" : ""}" onclick="goBanner(2)"></button>
            <button class="dot ${bannerIndex === 3 ? "active" : ""}" onclick="goBanner(3)"></button>
            <button class="dot ${bannerIndex === 4 ? "active" : ""}" onclick="goBanner(4)"></button>
        </div>
    `;
}

function goBanner(index){
    bannerIndex = index;
    renderBanner();
}

let touchStartX = 0;
let touchEndX = 0;

bannerBox.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
});

bannerBox.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe(){
    const diff = touchEndX - touchStartX;
    if(Math.abs(diff) < 35) return;

    if(diff < 0){
        bannerIndex = (bannerIndex + 1) % bannerVideos.length;
    }else{
        bannerIndex = (bannerIndex - 1 + bannerVideos.length) % bannerVideos.length;
    }
    renderBanner();
}

setInterval(() => {
    bannerIndex = (bannerIndex + 1) % bannerVideos.length;
    renderBanner();
}, 5000);

function showTab(type){
    const casinoList = document.getElementById("casinoList");
    const slotList = document.getElementById("slotList");
    const casinoTab = document.getElementById("casinoTab");
    const slotTab = document.getElementById("slotTab");

    localStorage.setItem("selectedGameTab", type);

    if(type === "casino"){
        casinoList.style.display = "block";
        slotList.style.display = "none";
        casinoTab.classList.add("active");
        slotTab.classList.remove("active");
    }else{
        casinoList.style.display = "none";
        slotList.style.display = "block";
        casinoTab.classList.remove("active");
        slotTab.classList.add("active");
    }
}

const savedTab = localStorage.getItem("selectedGameTab");
if(savedTab === "slot"){
    showTab("slot");
}else{
    showTab("casino");
}

renderBanner();
</script>

</body>
</html>
